<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profissional - Luiz Henrique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-purple: #9d00ff;
            --bg-light: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --border-glass: rgba(255, 255, 255, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-light);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 255, 65, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(157, 0, 255, 0.1) 0px, transparent 40%),
                linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-main);
            padding: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            transition: all 0.5s ease;
        }

        .profile-img-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .status-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: var(--neon-green);
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--text-main) 40%, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .age-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--neon-purple);
            background: rgba(157, 0, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        #bio-container {
            color: var(--text-dim);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 25px;
            min-height: 45px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            text-align: left;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .info-card i {
            color: var(--neon-purple);
            margin-bottom: 8px;
            width: 18px;
        }

        .info-card strong {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .info-card span {
            font-size: 0.85rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* Tech Badges Section */
        .tech-section {
            margin-bottom: 30px;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .tech-tag {
            font-size: 0.7rem;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.05);
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-main);
            transition: 0.3s;
        }

        .tech-tag:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        #editBtn {
            background: linear-gradient(135deg, var(--neon-purple), #7e00cc);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #editBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(157, 0, 255, 0.2);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 0.9rem;
            background: var(--neon-purple);
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <main class="profile-card">
        <div class="profile-img-container">
            <img src="https://64.media.tumblr.com/8244d8ebf6f9ad4b96d6b44a88787cbb/tumblr_pz8pgpYTt71yuk3dso9_r2_250.png" 
                 alt="Luiz Henrique" class="profile-img">
            <div class="status-badge"></div>
        </div>

        <div class="age-tag">16 ANOS • FULLSTACK STUDENT</div>
        <h1 id="username">Luiz Henrique</h1>
        
        <p id="bio-container">
            <span id="bio"></span><span class="cursor"></span>
        </p>

        <div class="info-grid">
            <div class="info-card">
                <i data-lucide="map-pin"></i>
                <strong>Localização</strong>
                <span>Paraná, BR</span>
            </div>
            <div class="info-card">
                <i data-lucide="code-2"></i>
                <strong>Status</strong>
                <span>GeoFront Active</span>
            </div>
            <div class="info-card" style="grid-column: span 2;">
                <i data-lucide="mail"></i>
                <strong>E-mail Institucional</strong>
                <span>luiz.emidio@escola.pr.gov.br</span>
            </div>
        </div>

        <div class="tech-section">
            <div class="tech-tags">
                <span class="tech-tag">HTML5</span>
                <span class="tech-tag">CSS3</span>
                <span class="tech-tag">JavaScript</span>
                <span class="tech-tag">UI/UX</span>
                <span class="tech-tag">Node.js</span>
            </div>
        </div>
        
        <button id="editBtn">
            <i data-lucide="refresh-cw" style="width: 16px;"></i>
            Atualizar Sistema
        </button>
    </main>

    <script>
        // Inicializa ícones
        lucide.createIcons();

        const bioElement = document.getElementById('bio');
        const textoOriginal = "Desenvolvedor Front-End focado em criar experiências digitais modernas, leves e imersivas.";
        let i = 0;

        function digitar() {
            if (i < textoOriginal.length) {
                bioElement.textContent += textoOriginal.charAt(i);
                i++;
                setTimeout(digitar, 25);
            }
        }

        window.addEventListener('load', digitar);

        document.getElementById('editBtn').addEventListener('click', () => {
            const novoNome = prompt("Redefinir Nome Operacional:", document.getElementById('username').innerText);
            if (novoNome) {
                document.getElementById('username').innerText = novoNome;
            }
        });
    </script>

</body>
</html>
